# 覆盖率工作流:在 main 推送和 PR 时生成测试覆盖率报告。
# 独立于主 CI 流程,避免拖慢 lint-and-test 的反馈速度。
name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    name: Build Web Assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodelite-server/web

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nodelite-server/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload web dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist-coverage
          path: nodelite-server/web/dist
          retention-days: 1

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [web-build]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download web dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist-coverage
          path: nodelite-server/web/dist

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-coverage
          workspaces: |
            . -> target

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@51b65422b7953c6b71a6f15b2ba16135551ce70a # cargo-tarpaulin
        with:
          tool: cargo-tarpaulin

      - name: Run coverage
        env:
          NODELITE_SKIP_WEB_BUILD: 1
        run: cargo tarpaulin --config tarpaulin.toml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: target/tarpaulin/cobertura.xml
          fail_ci_if_error: false

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: target/tarpaulin/
          retention-days: 14
