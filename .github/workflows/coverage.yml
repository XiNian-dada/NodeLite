# 覆盖率工作流:在 main 推送和 PR 时生成测试覆盖率报告。
# 独立于主 CI 流程,避免拖慢 lint-and-test 的反馈速度。
name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    name: Build Web Assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodelite-server/web

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nodelite-server/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload web dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-dist-coverage
          path: nodelite-server/web/dist
          retention-days: 1

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [web-build]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download web dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-dist-coverage
          path: nodelite-server/web/dist

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-coverage
          workspaces: |
            . -> target

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@3b664cf14a5ece2f5ab5d6a546105849b250983c # cargo-tarpaulin

      - name: Run coverage
        env:
          NODELITE_SKIP_WEB_BUILD: 1
        run: cargo tarpaulin --config tarpaulin.toml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: target/tarpaulin/cobertura.xml
          fail_ci_if_error: false

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          retention-days: 14
