global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nodelite
    metrics_path: /metrics
    scheme: https
    basic_auth:
      username: "<readonly-username>"
      password_file: /etc/nodelite/secrets/metrics-password
    static_configs:
      - targets:
          - monitor.example.com
