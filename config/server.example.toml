[server]
listen = "127.0.0.1:8080"
public_base_url = "https://monitor.example.com"
node_registry_path = "./config/server.json"
history_db_path = "./data/history.sqlite3"
snapshot_path = "./data/snapshot.json"
stale_after_secs = 20
ping_interval_secs = 10
max_message_bytes = 65536

[auth]
username = "viewer"
password = "change-this-password"

[ui]
refresh_interval_secs = 5

[filters]
ignored_filesystems = ["tmpfs", "devtmpfs", "overlay"]

[install]
agent_release_base_url = "https://downloads.example.com/ximonitor/releases/latest/download"
